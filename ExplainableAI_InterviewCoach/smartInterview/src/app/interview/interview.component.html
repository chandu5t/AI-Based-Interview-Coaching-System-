<div class="interview-container page-transition">
  <div class="progress-header">
    <div class="progress-bar-container">
      <div class="progress-bar" [style.width]="progressPercentage + '%'"></div>
    </div>
  </div>

  <div class="questions-list">
    <div class="glass-card question-card" 
         *ngFor="let q of questions; let i = index" 
         [style.animation-delay]="(i * 50) + 'ms'">
      <div class="question-header">
        <div class="q-badge">{{ i + 1 }}</div>
        <div class="q-header-content">
          <h3 class="q-text">{{ q.question }}</h3>
          <span class="difficulty-pill" *ngIf="q.level">
            <span class="dot" [ngClass]="q.level"></span>
            {{ q.level | titlecase }} question
          </span>
        </div>
      </div>
      
      <div class="answer-wrapper">
        <div class="answer-header">
          <span class="answer-label">Your Answer</span>
          <button type="button"
                  class="voice-btn"
                  [class.voice-btn-active]="isRecordingFor(q.id)"
                  [disabled]="isTranscribingFor(q.id)"
                  (click)="toggleVoice(q)">
            <span class="voice-icon">
              <span class="mic-pulse" *ngIf="isRecordingFor(q.id)"></span>
              <svg viewBox="0 0 24 24">
                <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3z"></path>
                <path d="M19 11a1 1 0 0 0-2 0 5 5 0 1 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V21H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-3.08A7 7 0 0 0 19 11z"></path>
              </svg>
            </span>
            <span class="voice-text" *ngIf="!isRecordingFor(q.id)">Speak answer</span>
            <span class="voice-text" *ngIf="isRecordingFor(q.id)">Listening... click to stop</span>
            <span class="voice-text" *ngIf="!isRecordingFor(q.id) && isTranscribingFor(q.id)">Converting to text...</span>
          </button>
        </div>

        <textarea 
          [(ngModel)]="answers[q.id]" 
          placeholder="Type or speak your answer..." 
          class="answer-input"
          rows="4">
        </textarea>
        <div class="answer-meta">
          <div class="char-count">
            {{ (answers[q.id] || '').length }} characters
          </div>
          <div class="transcribe-status" *ngIf="isTranscribingFor(q.id)">
            <svg class="tiny-spinner" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Model is converting your recording into text...
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="sticky-footer">
    <div class="footer-content">
      <div class="progress-stats">
        <span class="answered-count">{{ answeredCount }}</span> / {{ totalQuestions }} answered
      </div>

      <div class="error-msg" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>

      <button 
        class="btn-primary" 
        [disabled]="!isAllAnswered || isLoading" 
        (click)="onSubmit()">
        <span *ngIf="!isLoading">Submit Answers</span>
        <div class="spinner-container" *ngIf="isLoading">
          <svg class="spinner" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Evaluating your answers...
        </div>
      </button>
    </div>
  </div>
</div>
